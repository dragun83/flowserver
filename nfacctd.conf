# Общие настройки
daemonize: false
pidfile: /var/run/nfacctd.pid

# Приём NetFlow (порт 2055 UDP)
nfacctd_port: 2055
nfacctd_ip: 0.0.0.0

# Агрегация данных (какие поля собирать и группировать)
#aggregate: src_host, dst_host, src_port, dst_port, proto, src_as, dst_as, bytes, packets, flows
#aggregate: src_host, dst_host, src_port, dst_port, proto, sum_bytes, sum_packets, flows
#aggregate: src_host, dst_host, src_port, dst_port, proto, src_as, dst_as, sum_bytes, sum_packets, flows

# Плагин вывода - MySQL (ClickHouse поддерживает MySQL protocol)
plugins: mysql[clickhouse]

# Настройки подключения к ClickHouse
sql_host[clickhouse]: localhost
sql_port[clickhouse]: 9004
sql_db[clickhouse]: default
sql_table[clickhouse]: netflow
sql_user[clickhouse]: default
sql_passwd[clickhouse]:


# Временные интервалы агрегации
sql_history[clickhouse]: 5m
sql_history_roundoff[clickhouse]: m

# Интервал сброса данных в БД (секунды)
sql_refresh_time[clickhouse]: 60

# Производительность
plugin_buffer_size: 1024000
plugin_pipe_size: 1024000