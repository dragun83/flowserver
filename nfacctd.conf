# Общие настройки
daemonize: true
pidfile: /var/run/nfacctd.pid

# Приём NetFlow (порт 2055 UDP)
nfacctd_port: 2055
nfacctd_ip: 0.0.0.0

# Агрегация данных (какие поля собирать и группировать)
aggregate: src_host, dst_host, src_port, dst_port, proto, src_as, dst_as, bytes, packets, flows

# Плагин вывода - MySQL (ClickHouse поддерживает MySQL protocol)
plugins: mysql[clickhouse]

# Настройки подключения к ClickHouse
mysql_host[clickhouse]: localhost
mysql_port[clickhouse]: 9004
mysql_db[clickhouse]: default
mysql_table[clickhouse]: netflow
mysql_user[clickhouse]: default
mysql_password[clickhouse]:
mysql_num_entries[clickhouse]: 1000000

# Временные интервалы агрегации
mysql_history[clickhouse]: 5m
mysql_history_roundoff[clickhouse]: m

# Интервал сброса данных в БД (секунды)
mysql_refresh_time[clickhouse]: 60

# Производительность
plugin_buffer_size: 1024000
plugin_pipe_size: 1024000